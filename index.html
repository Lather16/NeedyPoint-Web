<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NeedyPoint - Buy and sell cameras, lenses, and photography gear. Find top photographers for your next event.">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://needypoint.in/">
  <meta property="og:title" content="NeedyPoint - The Digital Curator">
  <meta property="og:description" content="NeedyPoint - Buy and sell cameras, lenses, and photography gear. Find top photographers for your next event.">
  <meta property="og:image" content="https://needypoint.in/icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://needypoint.in/">
  <meta property="twitter:title" content="NeedyPoint - The Digital Curator">
  <meta property="twitter:description" content="Buy and sell cameras, lenses, and photography gear. Find top photographers.">
  <meta property="twitter:image" content="https://needypoint.in/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NeedyPoint">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NeedyPoint</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #000000;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      border-radius: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    #loading-indicator {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="loading-container">
      <img class="logo" src="icons/Icon-192.png" alt="NeedyPoint Logo" />
      <div class="spinner"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
